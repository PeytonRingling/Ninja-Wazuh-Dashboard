services:
  dashboard:
    build: .
    expose:
      - "8000"
    env_file:
      - .env
    environment:
      DB_PATH: /data/suppression_log.db
      VIRTUAL_HOST: security.mes.suntado.com
      VIRTUAL_PORT: 8000
      LETSENCRYPT_HOST: security.mes.suntado.com
      LETSENCRYPT_EMAIL: ${LETSENCRYPT_EMAIL}
    volumes:
      - db_data:/data
    restart: unless-stopped

  nginx-proxy:
    image: nginxproxy/nginx-proxy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/tmp/docker.sock:ro
      - certs:/etc/nginx/certs
      - vhost:/etc/nginx/vhost.d
      - html:/usr/share/nginx/html
    restart: unless-stopped

  acme-companion:
    image: nginxproxy/acme-companion
    volumes_from:
      - nginx-proxy
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - certs:/etc/nginx/certs
      - acme:/etc/acme.sh
    environment:
      DEFAULT_EMAIL: ${LETSENCRYPT_EMAIL}
    restart: unless-stopped

volumes:
  db_data:
  certs:
  vhost:
  html:
  acme:
